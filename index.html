<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' http://192.168.18.3:8080 ws://192.168.18.3:8080; frame-src 'self' https://*;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyOS iA - Generative OS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
</head>
<body>
    <!-- Capa de Fondo Animada -->
    <div class="desktop-background">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- Espacio de Trabajo (Escritorio) -->
    <main id="desktop" class="desktop">
        <!-- El historial ahora vive aquí, detrás de las ventanas -->
        <div id="chat-history" class="chat-history"></div>
    </main>

    <!-- Barra de Comandos (Siempre arriba) -->
    <section class="command-center">
        <div class="input-wrapper">
            <button id="new-session-btn" class="icon-btn" title="Nueva Sesión">
                <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            </button>
            <button id="hide-chat-btn" class="icon-btn" title="Mostrar/Ocultar Chat">
                <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
            </button>
            <input type="text" id="user-input" placeholder="¿Qué quieres crear hoy?" autocomplete="off">
            <button id="send-btn" class="icon-btn" title="Enviar">
                <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
            <button id="voice-btn" class="icon-btn" title="Dictar">
                <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            </button>
        </div>
        <div id="ai-status" class="status-indicator">
            <span class="dot"></span>
            <span class="status-text">EasyOS Kernel Listo</span>
        </div>
    </section>

    <!-- Esquina inferior derecha: marca, reloj, configuración -->
    <section class="desktop-corbner">
        <span class="brand-watermark">EasyOS iA · Sistema Operativo Generativo</span>
        <div class="clock-settings-row">
            <button id="apps-btn" class="apps-btn" title="Aplicaciones">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M4 8h4V4H4v4zm6 12h4v-4h-4v4zm-6 0h4v-4H4v4zm0-6h4v-4H4v4zm6 0h4v-4h-4v4zm6-10v4h4V4h-4zm-6 4h4V4h-4v4zm6 6h4v-4h-4v4zm0 6h4v-4h-4v4z"/></svg>
            </button>
            <span id="system-clock" class="system-clock"></span>
            <button id="settings-btn" class="settings-btn" title="Configuración">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.6 3.6 0 0112 15.6z"/></svg>
            </button>
        </div>
    </section>

    <!-- Scripts -->
    <script type="module" src="js/api.js"></script>
    <script type="module" src="js/ai.js"></script>
    <script type="module" src="js/kernel.js"></script>
    <script type="module" src="js/chat.js"></script>
    <script type="module" src="js/settings.js"></script>
</body>
</html>
