<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simulación Sistema Solar 3D</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
            font-family: Arial, sans-serif;
        }

        canvas {
            display: block;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #444;
            z-index: 100;
        }

        #controls label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
        }

        #speed-slider {
            width: 220px;
        }

        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ccc;
            font-size: 13px;
            background: rgba(0,0,0,0.4);
            padding: 10px;
            border-radius: 8px;
            z-index: 100;
        }
    </style>

    <!-- THREE.JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <!-- ORBIT CONTROLS -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="controls">
    <label for="speed-slider">
        Velocidad de Órbita
    </label>

    <input
        type="range"
        id="speed-slider"
        min="0"
        max="3"
        step="0.1"
        value="0.5"
    />
</div>

<div id="instructions">
    🖱 Arrastrar = Rotar cámara<br>
    🖱 Rueda = Zoom<br>
    🖱 Click derecho = Mover vista
</div>

<script>

    // =====================================================
    // ESCENA
    // =====================================================

    const scene = new THREE.Scene();

    // =====================================================
    // CÁMARA
    // =====================================================

    const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.1,
        10000
    );

    camera.position.set(0, 40, 120);

    // =====================================================
    // RENDERER
    // =====================================================

    const renderer = new THREE.WebGLRenderer({
        antialias: true
    });

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

    renderer.setPixelRatio(window.devicePixelRatio);

    document.body.appendChild(renderer.domElement);

    // =====================================================
    // CONTROLES ORBIT
    // =====================================================

    const controls = new THREE.OrbitControls(
        camera,
        renderer.domElement
    );

    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    controls.enableZoom = true;
    controls.enableRotate = true;
    controls.enablePan = true;

    controls.minDistance = 20;
    controls.maxDistance = 500;

    // =====================================================
    // LUCES
    // =====================================================

    const ambientLight = new THREE.AmbientLight(
        0x333333
    );

    scene.add(ambientLight);

    const sunLight = new THREE.PointLight(
        0xffffff,
        2,
        5000
    );

    scene.add(sunLight);

    // =====================================================
    // ESTRELLAS
    // =====================================================

    function createStars() {

        const geometry = new THREE.BufferGeometry();

        const vertices = [];

        for (let i = 0; i < 6000; i++) {

            vertices.push(
                (Math.random() - 0.5) * 4000,
                (Math.random() - 0.5) * 4000,
                (Math.random() - 0.5) * 4000
            );
        }

        geometry.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(vertices, 3)
        );

        const material = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 1.5
        });

        const stars = new THREE.Points(
            geometry,
            material
        );

        scene.add(stars);
    }

    createStars();

    // =====================================================
    // SOL
    // =====================================================

    const sunGeometry = new THREE.SphereGeometry(
        12,
        64,
        64
    );

    const sunMaterial = new THREE.MeshBasicMaterial({
        color: 0xffcc00
    });

    const sun = new THREE.Mesh(
        sunGeometry,
        sunMaterial
    );

    scene.add(sun);

    // =====================================================
    // PLANETAS
    // =====================================================

    const planets = [];

    let orbitSpeedMultiplier = 0.5;

    const planetData = [

        {
            name: "Mercurio",
            radius: 2,
            distance: 18,
            speed: 0.02,
            color: 0xaaaaaa
        },

        {
            name: "Venus",
            radius: 3,
            distance: 26,
            speed: 0.015,
            color: 0xffcc66
        },

        {
            name: "Tierra",
            radius: 3.3,
            distance: 36,
            speed: 0.01,
            color: 0x3366ff
        },

        {
            name: "Marte",
            radius: 2.7,
            distance: 46,
            speed: 0.008,
            color: 0xff5533
        },

        {
            name: "Júpiter",
            radius: 8,
            distance: 65,
            speed: 0.004,
            color: 0xd2b48c
        },

        {
            name: "Saturno",
            radius: 7,
            distance: 90,
            speed: 0.003,
            color: 0xeeddaa
        },

        {
            name: "Urano",
            radius: 5,
            distance: 115,
            speed: 0.002,
            color: 0x66ffff
        },

        {
            name: "Neptuno",
            radius: 5,
            distance: 140,
            speed: 0.001,
            color: 0x4444ff
        }
    ];

    planetData.forEach(data => {

        // GEOMETRÍA
        const geometry = new THREE.SphereGeometry(
            data.radius,
            32,
            32
        );

        // MATERIAL
        const material = new THREE.MeshStandardMaterial({
            color: data.color,
            roughness: 0.7,
            metalness: 0.1
        });

        // MESH
        const planet = new THREE.Mesh(
            geometry,
            material
        );

        scene.add(planet);

        // ÓRBITA VISUAL
        const orbitGeometry = new THREE.RingGeometry(
            data.distance - 0.1,
            data.distance + 0.1,
            128
        );

        const orbitMaterial = new THREE.MeshBasicMaterial({
            color: 0xffffff,
            transparent: true,
            opacity: 0.15,
            side: THREE.DoubleSide
        });

        const orbit = new THREE.Mesh(
            orbitGeometry,
            orbitMaterial
        );

        orbit.rotation.x = Math.PI / 2;

        scene.add(orbit);

        // ANILLOS DE SATURNO
        if (data.name === "Saturno") {

            const ringGeometry = new THREE.RingGeometry(
                9,
                14,
                64
            );

            const ringMaterial = new THREE.MeshBasicMaterial({
                color: 0xbbbbbb,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.8
            });

            const ring = new THREE.Mesh(
                ringGeometry,
                ringMaterial
            );

            ring.rotation.x = Math.PI / 2;

            planet.add(ring);
        }

        planets.push({
            mesh: planet,
            distance: data.distance,
            speed: data.speed,
            angle: Math.random() * Math.PI * 2
        });
    });

    // =====================================================
    // SLIDER VELOCIDAD
    // =====================================================

    const slider = document.getElementById(
        "speed-slider"
    );

    slider.addEventListener("input", e => {

        orbitSpeedMultiplier =
            parseFloat(e.target.value);
    });

    // =====================================================
    // ANIMACIÓN
    // =====================================================

    function animate() {

        requestAnimationFrame(animate);

        // ROTACIÓN DEL SOL
        sun.rotation.y += 0.002;

        // PLANETAS
        planets.forEach(planet => {

            planet.angle +=
                planet.speed *
                orbitSpeedMultiplier;

            planet.mesh.position.x =
                Math.cos(planet.angle) *
                planet.distance;

            planet.mesh.position.z =
                Math.sin(planet.angle) *
                planet.distance;

            planet.mesh.rotation.y += 0.01;
        });

        // CONTROLES
        controls.update();

        // RENDER
        renderer.render(scene, camera);
    }

    animate();

    // =====================================================
    // RESPONSIVE
    // =====================================================

    window.addEventListener("resize", () => {

        camera.aspect =
            window.innerWidth /
            window.innerHeight;

        camera.updateProjectionMatrix();

        renderer.setSize(
            window.innerWidth,
            window.innerHeight
        );
    });

</script>

</body>
</html>
