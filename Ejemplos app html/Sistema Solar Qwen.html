<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Solar 3D - Controlable</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-container {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: rgba(0, 0, 0, 0.7); padding: 20px; border-radius: 8px;
            border: 1px solid #555; width: 220px;
        }
        h1 { margin: 0 0 15px 0; font-size: 1.1rem; color: #fff; }
        .control-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #ccc; }
        input[type=range] { width: 100%; cursor: pointer; }
        .info { font-size: 0.8rem; color: #aaa; line-height: 1.4; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Importamos OrbitControls para mover la cámara -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-container">
        <h1>Sistema Solar</h1>
        <div class="control-group">
            <label for="speedControl">Velocidad</label>
            <input type="range" id="speedControl" min="0" max="5" step="0.1" value="1">
        </div>
        <div class="info">
            <p>👈 Arrastra para rotar</p>
            <p>👆 Rueda para zoom</p>
            <p>👉 Click derecho para mover</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- DATOS DEL SISTEMA SOLAR ---
        const planetConfig = [
            { name: "Mercurio", color: 0x999999, size: 0.8, distance: 20, speed: 4.1, angle: Math.random() * Math.PI * 2 },
            { name: "Venus",    color: 0xE1B676, size: 1.2, distance: 30, speed: 1.6, angle: Math.random() * Math.PI * 2 },
            { name: "Tierra",   color: 0x2233FF, size: 1.3, distance: 40, speed: 1.0, angle: Math.random() * Math.PI * 2 },
            { name: "Marte",    color: 0xFF4500, size: 0.9, distance: 50, speed: 0.5, angle: Math.random() * Math.PI * 2 },
            { name: "Júpiter",  color: 0xD9A066, size: 3.5, distance: 70, speed: 0.08, angle: Math.random() * Math.PI * 2 },
            { name: "Saturno",  color: 0xEAD6B8, size: 3.0, distance: 95, speed: 0.03, angle: Math.random() * Math.PI * 2, hasRing: true },
            { name: "Urano",    color: 0xADD8E6, size: 2.0, distance: 115, speed: 0.01, angle: Math.random() * Math.PI * 2 },
            { name: "Neptuno",  color: 0x5D5DD6, size: 1.9, distance: 135, speed: 0.008, angle: Math.random() * Math.PI * 2 }
        ];

        let scene, camera, renderer;
        let sunMesh, stars;
        let planets = [];
        let controls;
        let speedMultiplier = 1;

        function init() {
            // 1. Escena
            scene = new THREE.Scene();
            
            // 2. Cámara
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 60, 80);

            // 3. Renderizador
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 4. Luces
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            const sunLight = new THREE.PointLight(0xffffff, 2.5, 400);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);

            // 5. Objetos
            createSun();
            createStars();
            createPlanets();

            // 6. CONTROLES DE CÁMARA (Aquí está la magia para mover y zoom)
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; // Suaviza el movimiento
            controls.dampingFactor = 0.05;
            controls.screenSpacePanning = false;
            controls.minDistance = 50;
            controls.maxDistance = 400;

            setupUI();
            animate();
        }

        function createSun() {
            const geometry = new THREE.SphereGeometry(4, 32, 32);
            const material = new THREE.MeshBasicMaterial({ color: 0xFFD700 });
            sunMesh = new THREE.Mesh(geometry, material);
            
            // Brillo exterior
            const glowGeo = new THREE.SphereGeometry(4.5, 32, 32);
            const glowMat = new THREE.MeshBasicMaterial({ color: 0xFF8800, transparent: true, opacity: 0.3, side: THREE.BackSide });
            sunMesh.add(new THREE.Mesh(glowGeo, glowMat));

            // Anillo de luz
            const ringGeo = new THREE.RingGeometry(4.1, 4.6, 32);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0xFFCC00, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
            sunMesh.add(new THREE.Mesh(ringGeo, ringMat));
            
            sunMesh.rotation.x = Math.PI / 2; // Rotar el anillo
            scene.add(sunMesh);
        }

        function createStars() {
            const geometry = new THREE.BufferGeometry();
            const count = 5000;
            const positions = new Float32Array(count * 3);
            for(let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 600;
            }
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.7, transparent: true });
            stars = new THREE.Points(geometry, material);
            scene.add(stars);
        }

        function createPlanets() {
            planetConfig.forEach(data => {
                const orbitGroup = new THREE.Group();
                
                const geometry = new THREE.SphereGeometry(data.size, 32, 32);
                const material = new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.7, metalness: 0.1 });
                const planet = new THREE.Mesh(geometry, material);
                planet.position.x = data.distance;
                
                if(data.hasRing) {
                    const ringGeo = new THREE.RingGeometry(data.size * 1.2, data.size * 2.0, 64);
                    const ringMat = new THREE.MeshBasicMaterial({ color: 0xAA8866, side: THREE.DoubleSide, transparent: true, opacity: 0.7 });
                    planet.add(new THREE.Mesh(ringGeo, ringMat));
                }

                const orbitGeo = new THREE.RingGeometry(data.distance - 0.2, data.distance + 0.2, 64);
                const orbitMat = new THREE.MeshBasicMaterial({ color: 0x444444, side: THREE.DoubleSide, transparent: true, opacity: 0.3 });
                scene.add(new THREE.Mesh(orbitGeo, orbitMat));

                planets.push({ mesh: planet, data: data, angle: data.angle });
                scene.add(planet);
                scene.add(orbitGroup);
            });
        }

        function setupUI() {
            document.getElementById('speedControl').addEventListener('input', (e) => {
                speedMultiplier = parseFloat(e.target.value);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if(stars) stars.rotation.y += 0.0005;

            planets.forEach(p => {
                p.angle += 0.005 * p.data.speed * speedMultiplier;
                p.mesh.position.x = Math.cos(p.angle) * p.data.distance;
                p.mesh.position.z = Math.sin(p.angle) * p.data.distance;
                p.mesh.rotation.y += 0.02;
            });

            // Sincronizar controles con la animación
            controls.update();

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
